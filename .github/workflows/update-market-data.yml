name: Update market data & deploy

on:
  schedule:
    # 5분 간격으로 깨운 뒤 잡 안에서 운영 시간(매일 08~20시 KST)을 검사한다.
    # 시간대를 cron에 넣으면 스케줄 등록이 누락되는 사례가 있어 단순 표기를 쓴다.
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: market-data
  cancel-in-progress: false

jobs:
  update-data:
    # 사용자가 main에 push한 경우엔 데이터 갱신 없이 배포만 한다
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: 운영 시간 확인 (매일 08~20시 KST, 수동 실행은 항상 통과)
        id: gate
        run: |
          hour=$(TZ=Asia/Seoul date +%-H)
          if [ "${{ github.event_name }}" != "schedule" ] || { [ "$hour" -ge 8 ] && [ "$hour" -le 20 ]; }; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "운영 시간 외(현재 ${hour}시 KST) — 갱신 생략"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.proceed == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.proceed == 'true'
        with:
          node-version: 20

      - name: Fetch market data
        if: steps.gate.outputs.proceed == 'true'
        run: node scripts/fetch-market.js

      - name: Commit & push if changed
        if: steps.gate.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet assets/js/data.js; then
            git add assets/js/data.js
            git commit -m "chore: 시황 데이터 갱신"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi

  deploy:
    needs: update-data
    # push 이벤트면 update-data가 skipped 상태여도 배포하고,
    # 스케줄 실행은 운영 시간 통과(proceed=true)일 때만 배포한다
    if: ${{ !cancelled() && (needs.update-data.result == 'skipped' || (needs.update-data.result == 'success' && needs.update-data.outputs.proceed == 'true')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # update-data가 방금 푸시한 데이터 커밋까지 포함해 최신을 받는다
          ref: ${{ github.ref }}

      # gh-pages 브랜치로 배포 — 브랜치가 생기면 GitHub Pages가 자동 활성화된다
      # (Settings > Pages 의 Source 가 "Deploy from a branch: gh-pages" 로 잡힘)
      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push -f origin HEAD:gh-pages
