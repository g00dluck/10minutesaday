name: Update market data & deploy

on:
  schedule:
    # 매일 08:00–19:55 KST, 5분 간격 (KST = UTC+9 → UTC 23:00–10:55)
    - cron: "*/5 0-10,23 * * *"
    # 매일 20:00 KST (11:00 UTC) 마지막 갱신
    - cron: "0 11 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: market-data
  cancel-in-progress: false

jobs:
  update-data:
    # 사용자가 main에 push한 경우엔 데이터 갱신 없이 배포만 한다
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch market data
        run: node scripts/fetch-market.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet assets/js/data.js; then
            git add assets/js/data.js
            git commit -m "chore: 시황 데이터 갱신"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi

  deploy:
    needs: update-data
    # push 이벤트면 update-data가 skipped 상태여도 배포한다
    if: ${{ !cancelled() && (needs.update-data.result == 'success' || needs.update-data.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # update-data가 방금 푸시한 데이터 커밋까지 포함해 최신을 받는다
          ref: ${{ github.ref }}

      # gh-pages 브랜치로 배포 — 브랜치가 생기면 GitHub Pages가 자동 활성화된다
      # (Settings > Pages 의 Source 가 "Deploy from a branch: gh-pages" 로 잡힘)
      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push -f origin HEAD:gh-pages
